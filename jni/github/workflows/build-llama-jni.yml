name: Build libllama_jni.so

# Manual trigger only — run this from the GitHub app/website on your phone
# (Actions tab -> this workflow -> "Run workflow"). No PC required.
on:
  workflow_dispatch:
    inputs:
      llama_cpp_ref:
        description: 'llama.cpp git ref to build (branch, tag, or commit)'
        required: false
        default: 'master'

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    steps:
      - name: Check out this repo (for jni/ sources)
        uses: actions/checkout@v4
        with:
          path: yuvika-jni-project

      - name: Clone llama.cpp
        run: |
          git clone --depth 1 --branch "${{ github.event.inputs.llama_cpp_ref || 'master' }}" \
            https://github.com/ggml-org/llama.cpp.git llama.cpp-src
        working-directory: ${{ github.workspace }}

      # Place llama.cpp-src as a sibling of jni/, matching the relative path
      # CMakeLists.txt expects (../llama.cpp-src from jni/).
      - name: Arrange build layout
        run: |
          mkdir -p build-root
          cp -r yuvika-jni-project/jni build-root/jni
          cp -r llama.cpp-src build-root/llama.cpp-src

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c

      - name: Configure (arm64-v8a)
        run: |
          cmake -S build-root/jni -B build-out/arm64-v8a \
            -DCMAKE_TOOLCHAIN_FILE=${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build (arm64-v8a)
        run: cmake --build build-out/arm64-v8a --config Release -j 4

      - name: Locate built .so
        id: find-so
        run: |
          SO_PATH=$(find build-out/arm64-v8a -name "libllama_jni.so" | head -n 1)
          if [ -z "$SO_PATH" ]; then
            echo "libllama_jni.so not found in build output" >&2
            exit 1
          fi
          echo "Found: $SO_PATH"
          mkdir -p artifact-out/arm64-v8a
          cp "$SO_PATH" artifact-out/arm64-v8a/libllama_jni.so
          ls -la artifact-out/arm64-v8a/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libllama_jni-arm64-v8a
          path: artifact-out/arm64-v8a/libllama_jni.so
          retention-days: 30
          
